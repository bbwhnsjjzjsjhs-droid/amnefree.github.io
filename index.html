<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор Конфига WireGuard / AmneziaWG</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    button, a.download-btn {
      background-color: #f6821f;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s;
    }
    button:hover, a.download-btn:hover {
      background-color: #e06d10;
    }
    button:disabled {
      background-color: #555;
      cursor: not-allowed;
    }
    a.download-btn.hidden {
      display: none;
    }
    pre {
      background-color: #1e1e1e;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      color: #00ff66;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h2>Генератор WireGuard / AmneziaWG (Автономный)</h2>
  <p>Все ключи генерируются прямо у вас в браузере. Нажмите кнопку для скачивания `.conf` файла.</p>
  
  <div class="btn-group">
    <button id="genBtn" onclick="generateConfig()">Сгенерировать и скачать .conf</button>
    <a id="downloadBtn" class="download-btn hidden" download="warp.conf">Скачать повторно warp.conf</a>
  </div>

  <h3>Результат:</h3>
  <pre id="output">Нажмите кнопку для запуска...</pre>

  <script>
    // Публичный CORS Proxy для работы с API из браузера
    const CORS_PROXY = "https://corsproxy.io/?";

    // --- Криптография X25519 ---
    const P = 2n ** 255n - 19n;
    const BASE_POINT = new Uint8Array(32); 
    BASE_POINT[0] = 9;

    function clamp(k) {
      k[0] &= 248;
      k[31] &= 127;
      k[31] |= 64;
    }

    function decodeLE(s) {
      let r = 0n;
      for (let i = 31; i >= 0; i--) r = (r << 8n) | BigInt(s[i]);
      return r;
    }

    function encodeLE(x) {
      const r = new Uint8Array(32);
      for (let i = 0; i < 32; i++) { r[i] = Number(x & 0xffn); x >>= 8n; }
      return r;
    }

    function modPow(a, e) {
      let r = 1n;
      a %= P;
      while (e > 0n) {
        if (e & 1n) r = (r * a) % P;
        a = (a * a) % P;
        e >>= 1n;
      }
      return r;
    }

    function x25519(scalarBytes, uBytes) {
      clamp(scalarBytes);
      const u = decodeLE(uBytes);
      let x1 = u, x2 = 1n, z2 = 0n, x3 = u, z3 = 1n, swap = 0;
      const s = decodeLE(scalarBytes);

      for (let t = 254; t >= 0; t--) {
        const kt = Number((s >> BigInt(t)) & 1n);
        swap ^= kt;
        if (swap) { let t; t = x2; x2 = x3; x3 = t; t = z2; z2 = z3; z3 = t; }
        swap = kt;
        const A = (x2 + z2) % P, AA = (A * A) % P;
        const B = (x2 - z2 + P) % P, BB = (B * B) % P;
        const E = (AA - BB + P) % P;
        const C = (x3 + z3) % P, D = (x3 - z3 + P) % P;
        const DA = (D * A) % P, CB = (C * B) % P;
        const sum = (DA + CB) % P;
        x3 = (sum * sum) % P;
        const diff = (DA - CB + P) % P;
        z3 = (u * ((diff * diff) % P)) % P;
        x2 = (AA * BB) % P;
        z2 = (E * ((AA + 121665n * E) % P)) % P;
      }

      if (swap) { let t; t = x2; x2 = x3; x3 = t; t = z2; z2 = z3; z3 = t; }
      return encodeLE((x2 * modPow(z2, P - 2n)) % P);
    }

    function generateKeyPair() {
      const priv = new Uint8Array(32);
      crypto.getRandomValues(priv);
      clamp(priv);
      return { privateKey: priv, publicKey: x25519(priv, BASE_POINT) };
    }

    function b64(bytes) {
      let s = '';
      for (const b of bytes) s += String.fromCharCode(b);
      return btoa(s);
    }

    // --- API Взаимодействие с Cloudflare ---
    async function registerWarp(pubB64) {
      const tos = new Date().toISOString().replace(/\.\d+Z$/, 'Z');
      const targetUrl = 'https://api.cloudflareclient.com/v0i1909051800/reg';
      
      const regResp = await fetch(CORS_PROXY + encodeURIComponent(targetUrl), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ install_id: '', tos, key: pubB64, fcm_token: '', type: 'ios', locale: 'en_US' }),
      });
      return regResp.json();
    }

    async function enableWarp(id, token) {
      const targetUrl = `https://api.cloudflareclient.com/v0i1909051800/reg/${id}`;
      
      const resp = await fetch(CORS_PROXY + encodeURIComponent(targetUrl), {
        method: 'PATCH',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify({ warp_enabled: true }),
      });
      return resp.json();
    }

    const I1_HEX = '<b 0xc2000000011419fa4bb3599f336777de79f81ca9a8d80d91eeec000044c635cef024a885dcb66d1420a91a8c427e87d6cf8e08b563932f449412cddf77d3e2594ea1c7a183c238a89e9adb7ffa57c133e55c59bec101634db90afb83f75b19fe703179e26a31902324c73f82d9354e1ed8da39af610afcb27e6590a44341a0828e5a3d2f0e0f7b0945d7bf3402feea0ee6332e19bdf48ffc387a97227aa97b205a485d282cd66d1c384bafd63dc42f822c4df2109db5b5646c458236ddcc01ae1c493482128bc0830c9e1233f0027a0d262f92b49d9d8abd9a9e0341f6e1214761043c021d7aa8c464b9d865f5fbe234e49626e00712031703a3e23ef82975f014ee1e1dc428521dc23ce7c6c13663b19906240b3efe403cf30559d798871557e4e60e86c29ea4504ed4d9bb8b549d0e8acd6c334c39bb8fb42ede68fb2aadf00cfc8bcc12df03602bbd4fe701d64a39f7ced112951a83b1dbbe6cd696dd3f15985c1b9fef72fa8d0319708b633cc4681910843ce753fac596ed9945d8b839aeff8d3bf0449197bd0bb22ab8efd5d63eb4a95db8d3ffc796ed5bcf2f4a136a8a36c7a0c65270d511aebac733e61d414050088a1c3d868fb52bc7e57d3d9fd132d78b740a6ecdc6c24936e92c28672dbe00928d89b891865f885aeb4c4996d50c2bbbb7a99ab5de02ac89b3308e57bcecf13f2da0333d1420e18b66b4c23d625d836b538fc0c221d6bd7f566a31fa292b85be96041d8e0bfe655d5dc1afed23eb8f2b3446561bbee7644325cc98d31cea38b865bdcc507e48c6ebdc7553be7bd6ab963d5a14615c4b81da7081c127c791224853e2d19bafdc0d9f3f3a6de898d14abb0e2bc849917e0a599ed4a541268ad0e60ea4d147dc33d17fa82f22aa505ccb53803a31d10a7ca2fea0b290a52ee92c7bf4aab7cea4e3c07b1989364eed87a3c6ba65188cd349d37ce4eefde9ec43bab4b4dc79e03469c2ad6b902e28e0bbbbf696781ad4edf424ffb35ce0236d373629008f142d04b5e08a124237e03e3149f4cdde92d7fae581a1ac332e26b2c9c1a6bdec5b3a9c7a2a870f7a0c25fc6ce245e029b686e346c6d862ad8df6d9b62474fbc31dbb914711f78074d4441f4e6e9edca3c52315a5c0653856e23f681558d669f4a4e6915bcf42b56ce36cb7dd3983b0b1d6fdf0f8efddb68e7ca0ae9dd4570fe6978fbb524109f6ec957ca61f1767ef74eb803b0f16abd0087cf2d01bc1db1c01d97ac81b3196c934586963fe7cf2d310e0739621e8bd00dc23fded18576d8c8f285d7bb5f43b547af3c76235de8b6f757f817683b2151600b11721219212bf27558edd439e73fce951f61d582320e5f4d6c315c71129b719277fc144bbe8ded25ab6d29b6e189c9bd9b16538faf60cc2aab3c3bb81fc2213657f2dd0ceb9b3b871e1423d8d3e8cc008721ef03b28e0ee7bb66b8f2a2ac01ef88df1f21ed49bf1ce435df31ac34485936172567488812429c269b49ee9e3d99652b51a7a614b7c460bf0d2d64d8349ded7345bedab1ea0a766a8470b1242f38d09f7855a32db39516c2bd4bcc538c52fa3a90c8714d4b006a15d9c7a7d04919a1cab48da7cce0d5de1f9e5f8936cffe469132991c6eb84c5191d1bcf69f70c58d9a7b66846440a9f0eef25ee6ab62715b50ca7bef0bc3013d4b62e1639b5028bdf757454356e9326a4c76dabfb497d451a3a1d2dbd46ec283d255799f72dfe878ae25892e25a2542d3ca9018394d8ca35b53ccd94947a8>';

    function buildConfig(privB64, peerPub, v4, v6) {
      return `[Interface]
PrivateKey = ${privB64}
S1 = 0
S2 = 0
Jc = 120
Jmin = 23
Jmax = 911
H1 = 1
H2 = 2
H3 = 3
H4 = 4
MTU = 1280
I1 = ${I1_HEX}
Address = ${v4}, ${v6}
DNS = 1.1.1.1, 2606:4700:4700::1111, 1.0.0.1, 2606:4700:4700::1001

[Peer]
PublicKey = ${peerPub}
AllowedIPs = 0.0.0.0/0, ::/0
Endpoint = 162.159.192.1:500`;
    }

    // --- Логика Управления UI ---
    let currentBlobUrl = null;

    async function generateConfig() {
      const genBtn = document.getElementById('genBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const out = document.getElementById('output');

      genBtn.disabled = true;
      downloadBtn.classList.add('hidden');
      out.innerText = "1/3 Генерация ключей...\n";

      try {
        const pair = generateKeyPair();
        const privB64 = b64(pair.privateKey);
        const pubB64 = b64(pair.publicKey);

        out.innerText += "2/3 Регистрация в Cloudflare WARP...\n";
        const regData = await registerWarp(pubB64);
        const id = regData.result?.id;
        const token = regData.result?.token;

        if (!id || !token) throw new Error('Ошибка регистрации: ' + JSON.stringify(regData));

        out.innerText += "3/3 Активация WARP и сборка конфигурации...\n";
        const warpData = await enableWarp(id, token);
        const cfg = warpData.result?.config;
        if (!cfg) throw new Error('Ошибка включения WARP: ' + JSON.stringify(warpData));

        const peerPub = cfg.peers[0]?.public_key;
        const v4 = cfg.interface?.addresses?.v4;
        const v6 = cfg.interface?.addresses?.v6;

        if (!peerPub || !v4 || !v6) throw new Error('Отсутствуют нужные поля конфигурации');

        const wgConf = buildConfig(privB64, peerPub, v4, v6);
        out.innerText = wgConf;

        // Генерация Blob-файла для скачивания
        const blob = new Blob([wgConf], { type: 'text/plain;charset=utf-8' });
        if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
        currentBlobUrl = URL.createObjectURL(blob);

        downloadBtn.href = currentBlobUrl;
        downloadBtn.classList.remove('hidden');

        // Авто-скачивание файла
        downloadBtn.click();

      } catch (err) {
        out.innerText = "❌ Ошибка:\n" + err.message;
      } finally {
        genBtn.disabled = false;
      }
    }
  </script>
