<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Генератор WireGuard / AmneziaWG</title>
  <style>
    body { font-family: sans-serif; background: #121212; color: #fff; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    button, a { background: #f6821f; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: bold; }
    pre { background: #1e1e1e; padding: 20px; border-radius: 8px; color: #00ff66; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h2>Генератор WireGuard / AmneziaWG</h2>
  <div style="display:flex; gap:10px; margin-bottom:20px;">
    <button id="genBtn" onclick="generate()">Сгенерировать и скачать .conf</button>
    <a id="downloadBtn" class="hidden" download="warp.conf">Скачать warp.conf</a>
  </div>
  <pre id="output">Нажмите кнопку для генерации...</pre>

  <script>
    const WORKER_URL = 'https://damp-meadow-fa92.bbwhnsjjzjsjhs.workers.dev/';
    let currentBlobUrl = null;

    async function generate() {
      const genBtn = document.getElementById('genBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const out = document.getElementById('output');

      genBtn.disabled = true;
      downloadBtn.classList.add('hidden');
      out.innerText = "Генерация... Пожалуйста, подождите...";

      try {
        const res = await fetch(WORKER_URL);
        if (!res.ok) throw new Error("Ошибка получения данных: " + res.statusText);

        const configText = await res.text();
        out.innerText = configText;

        const blob = new Blob([configText], { type: 'application/octet-stream' });
        if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
        currentBlobUrl = URL.createObjectURL(blob);

        downloadBtn.href = currentBlobUrl;
        downloadBtn.classList.remove('hidden');

        const temp = document.createElement('a');
        temp.href = currentBlobUrl;
        temp.setAttribute('download', 'warp.conf');
        document.body.appendChild(temp);
        temp.click();
        temp.remove();

      } catch (err) {
        out.innerText = "❌ Ошибка: " + err.message;
      } finally {
        genBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
